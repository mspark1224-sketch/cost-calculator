<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제품 원가 견적 시스템</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>제품 원가 견적 시스템</h1>

    <div class="menu">
      <button onclick="showPage('db')">1 원재료 DB</button>
      <button onclick="showPage('recipe')">2 배합표</button>
      <button onclick="showPage('calc')">3 원가 계산</button>
      <button onclick="showPage('history')">4 견적 조회</button>
    </div>

    <!-- ===================== -->
    <!-- 원재료 DB -->
    <!-- ===================== -->
    <div id="db" class="page">

      <h2>원재료 데이터베이스</h2>

      <div class="card">
        <div class="grid-4">

          <div>
            <label>원재료 코드</label>
            <input id="materialCode" />
          </div>

          <div>
            <label>원재료 이름</label>
            <input id="materialName" />
          </div>

          <div>
            <label>단가 (원/kg)</label>
            <input id="materialPrice" type="number" />
          </div>

          <div>
            <label>적용 날짜</label>
            <input id="materialDate" type="date" />
          </div>

        </div>

        <div class="button-row">
          <button onclick="saveMaterial()">저장</button>
          <button onclick="updateMaterial()">수정</button>
          <button class="secondary" onclick="clearMaterialInputs()">초기화</button>
        </div>

        <div class="upload-box">
          <input id="excelFile" type="file" accept=".xlsx,.xls,.csv" onchange="handleExcelUpload(event)" />
        </div>

      </div>

      <div class="card">

        <input id="materialSearch" placeholder="검색" oninput="loadMaterials()" />

        <table>
          <thead>
            <tr>
              <th>No</th>
              <th>코드</th>
              <th>이름</th>
              <th>단가</th>
              <th>적용일</th>
              <th>수정</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="materialList"></tbody>
        </table>

      </div>

      <div class="card">

        <h3>가격 히스토리</h3>

        <input id="priceSearch" placeholder="검색" />
        <button onclick="searchPriceHistory()">검색</button>
        <button onclick="loadPriceHistory(null)">전체</button>

        <table>
          <thead>
            <tr>
              <th>코드</th>
              <th>이름</th>
              <th>단가</th>
              <th>날짜</th>
            </tr>
          </thead>
          <tbody id="priceHistoryTable"></tbody>
        </table>

      </div>

    </div>

    <!-- ===================== -->
    <!-- 배합표 -->
    <!-- ===================== -->
    <div id="recipe" class="page" style="display:none;">

      <h2>배합표 작성</h2>

      <div class="product-box">

        <div class="row">

          <div class="field">
            <label>유형</label>
            <select id="productType">
              <option value="">선택</option>
              <option>가공치즈</option>
              <option>치즈</option>
              <option>발효유</option>
              <option>농후발효유</option>
            </select>
          </div>

          <div class="field">
            <label>제품명</label>
            <input id="productName">
          </div>

        </div>

      </div>

      <div class="button-row">
        <button onclick="addRecipe()">원재료 추가</button>
        <button onclick="resetRecipeTable()">초기화</button>
      </div>

      <div>
        배합비 합계: <span id="ratioTotal">0</span> %
        원가 합계: <span id="materialCostSum">0</span> 원
      </div>

      <table id="recipeTable">
        <thead>
          <tr>
            <th>원재료</th>
            <th>코드</th>
            <th>단가</th>
            <th>배합비</th>
            <th>원가</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td colspan="3">합계</td>
            <td id="ratioSum">0</td>
            <td id="costSum">0</td>
            <td></td>
          </tr>
        </tfoot>
      </table>

    <div class="bottom-area">

  <div>
    <label>내용량</label>
    <input id="productVolume" type="number">
  </div>

  <div>
    <label>단위</label>
    <select id="productUnit">
      <option value="g">g</option>
      <option value="ml">ml</option>
    </select>
  </div>

  <div>
    <label>비중</label>
    <input id="productDensity" type="number" value="1">
  </div>

  <div>
    <label>단위원가</label>
    <input id="recipeUnitCost" readonly>
  </div>

  <!-- ⭐ 핵심 버튼 -->
  <div style="display:flex; align-items:flex-end;">
    <button onclick="calculateUnitCost()">환산</button>
  </div>

</div>

<div style="text-align:right; margin-top:20px;">
  <button onclick="saveRecipe()">제품 저장</button>
</div>
                                               <!-- 저장된 제품 -->
      <div class="card">

        <input id="productSearch" placeholder="제품 검색" oninput="loadProducts()" />

        <table>
          <thead>
            <tr>
              <th>제품명</th>
              <th>원가</th>
              <th>날짜</th>
              <th>관리</th>
            </tr>
          </thead>
          <tbody id="productList"></tbody>
        </table>

      </div>

    </div>

    <!-- ===================== -->
    <!-- 원가 계산 -->
    <!-- ===================== -->
    <div id="calc" class="page" style="display:none;">

      <h2>원가 계산</h2>

      <div class="card">

        <label>제품 선택</label>
        <select id="calcProductSelect" onchange="loadMaterialCostFromProduct()">
          <option value="">선택</option>
        </select>

      </div>

      <div class="card">

        <label>원재료 원가</label>
        <input id="materialCostInput" readonly>

        <label>제조비</label>
        <input id="mfg" type="number">

        <label>포장비</label>
        <input id="pack" type="number">

        <label>물류비</label>
        <input id="logi" type="number">

        <label>마진</label>
        <input id="margin" type="number">

        <!-- ⭐ 추가된 핵심 -->
        <label>단위원가</label>
        <input id="calcUnitCost" readonly>

        <button onclick="calculate()">계산</button>
        <button onclick="saveQuote()">저장</button>

      </div>

      <div class="card">

        <p>제품명: <span id="calcProductName">-</span></p>
        <p>원재료: <span id="materialCostText">0</span></p>
        <p>부대비: <span id="extraCostText">0</span></p>
        <p>총원가: <span id="totalCostText">0</span></p>
        <p>견적가: <span id="result">0</span></p>

      </div>

    </div>

    <!-- ===================== -->
    <!-- 견적 -->
    <!-- ===================== -->
    <div id="history" class="page" style="display:none;">

      <h2>견적 조회</h2>

      <input id="quoteSearch" oninput="loadQuotes()" />

      <table>
        <thead>
          <tr>
            <th>제품명</th>
            <th>견적가</th>
            <th>날짜</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody id="quoteList"></tbody>
      </table>

    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
