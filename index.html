<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제품 원가 견적 시스템</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>제품 원가 견적 시스템</h1>

    <div class="menu">
      <button type="button" onclick="showPage('db')">1 원재료 DB</button>
      <button type="button" onclick="showPage('recipe')">2 배합표</button>
      <button type="button" onclick="showPage('calc')">3 원가 계산</button>
      <button type="button" onclick="showPage('history')">4 견적 조회</button>
    </div>

    <!-- ===================== -->
    <!-- 원재료 DB -->
    <!-- ===================== -->
    <div id="db" class="page">
      <h2>원재료 데이터베이스</h2>

      <!-- 원재료 등록 -->
      <div class="card db-top-card">
        <h3 class="section-title">원재료 등록</h3>

        <div class="material-form-row">

          <div class="field field-code">
            <label for="materialCode">원재료 코드</label>
            <input id="materialCode" type="text" />
          </div>

          <div class="field field-name">
            <label for="materialName">원재료 이름</label>
            <input id="materialName" type="text" />
          </div>

          <div class="field field-price">
            <label for="materialPrice">단가 (원/kg)</label>
            <input id="materialPrice" type="number" />
          </div>

          <div class="field field-date">
            <label for="materialDate">적용 날짜</label>
            <input id="materialDate" type="date" />
          </div>

          <div class="action-group material-action-group">
            <button type="button" onclick="saveMaterial()">저장</button>
            <button type="button" onclick="updateMaterial()">수정</button>
            <button type="button" class="secondary" onclick="clearMaterialInputs()">초기화</button>
          </div>

          <div class="upload-group material-upload-group">
            <div class="file-input-wrap">
              <input id="excelFile" type="file" accept=".xlsx,.xls,.csv" />
            </div>
            <button type="button" class="upload-btn" onclick="handleExcelUpload()">업로드</button>
          </div>

        </div>
      </div>

      <!-- 원재료 검색 -->
      <div class="card db-list-card">
        <h3 class="section-title">원재료 검색 (최신)</h3>

        <div class="search-row material-search-row">
          <input
            id="materialSearch"
            type="text"
            placeholder="원재료명 또는 코드 검색"
            oninput="loadMaterials()"
          />
          <button type="button" onclick="loadMaterials()">검색</button>
          <button type="button" class="secondary" onclick="document.getElementById('materialSearch').value=''; loadMaterials();">전체</button>
        </div>

        <div class="table-wrap">
          <table class="data-table material-table">
            <thead>
              <tr>
                <th class="col-no">No</th>
                <th class="col-code">코드</th>
                <th class="col-name">이름</th>
                <th class="col-price">단가</th>
                <th class="col-date">적용일</th>
                <th class="col-action center">수정</th>
                <th class="col-action center">삭제</th>
              </tr>
            </thead>
            <tbody id="materialList"></tbody>
          </table>
        </div>
      </div>

      <!-- 가격 히스토리 -->
      <div class="card db-history-card">
        <h3 class="section-title">가격 히스토리</h3>

        <div class="search-row history-search-row">
          <input
            id="priceSearch"
            type="text"
            placeholder="원재료명 또는 코드 검색"
          />
          <button type="button" onclick="searchPriceHistory()">검색</button>
          <button type="button" class="secondary" onclick="loadPriceHistory('')">전체</button>
        </div>

        <div class="table-wrap">
          <table class="data-table history-table">
            <thead>
              <tr>
                <th class="col-code">코드</th>
                <th class="col-name">이름</th>
                <th class="col-price">단가</th>
                <th class="col-date">날짜</th>
                <th class="col-action center">삭제</th>
              </tr>
            </thead>
            <tbody id="priceHistoryTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- ===================== -->
    <!-- 배합표 -->
    <!-- ===================== -->
    <div id="recipe" class="page" style="display:none;">
      <h2>배합표 작성</h2>

      <div class="product-box">
        <div class="product-inline">

          <div class="field field-type">
            <label for="productType">유형</label>
            <select id="productType">
              <option value="">선택</option>
              <option value="가공치즈">가공치즈</option>
              <option value="치즈">치즈</option>
              <option value="발효유">발효유</option>
              <option value="농후발효유">농후발효유</option>
            </select>
          </div>

          <div class="field field-name">
            <label for="productName">제품명</label>
            <input id="productName" type="text" />
          </div>

        </div>
      </div>

      <div class="button-row">
        <button type="button" onclick="addRecipe()">원재료 추가</button>
        <button type="button" onclick="resetRecipeTable()">초기화</button>
      </div>

      <div class="recipe-summary">
        배합비 합계: <strong id="ratioTotal">0</strong> %
        &nbsp;
        원가(원/kg) 합계: <strong id="materialCostSum">0</strong> 원
      </div>

      <table id="recipeTable">
        <thead>
          <tr>
            <th>원재료</th>
            <th>코드</th>
            <th>단가</th>
            <th>배합비</th>
            <th>원가(원/kg)</th>
            <th>삭제</th>
          </tr>
        </thead>
        <tbody></tbody>
        <tfoot>
          <tr>
            <td colspan="3"><strong>합계</strong></td>
            <td id="ratioSum">0</td>
            <td id="costSum">0 원</td>
            <td></td>
          </tr>
        </tfoot>
      </table>

      <div class="bottom-row">
        <div class="left-box">
          <div class="inline-group">

            <div class="mini-col">
              <label for="productVolume">내용량</label>
             <input id="productVolume" type="number" value="1000" />
            </div>

            <div class="mini-col">
              <label for="productUnit">단위</label>
             <select id="productUnit">
                <option value="g">g</option>
                <option value="ml">ml</option>
              </select>
            </div>

            <div class="mini-col">
              <label for="productDensity">비중</label>
              <input id="productDensity" type="number" step="0.001" value="1" />
            </div>

            <div class="mini-col">
              <button type="button" onclick="updateUnitCost()">환산</button>
            </div>

          </div>
        </div>

        <div class="right-box">
          <div class="result-row">

            <div class="mini-col">
              <label for="recipeUnitCost">단위원가(단위/kg)</label>
              <input id="recipeUnitCost" type="text" value="0" readonly />
            </div>

            <div class="mini-col">
              <button type="button" onclick="saveRecipe()">제품 저장</button>
            </div>

          </div>
        </div>
      </div>

      <div class="product-list-box">
        <input
          id="productSearch"
          type="text"
          placeholder="제품 검색"
          oninput="loadProducts()"
        />

        <table>
          <thead>
         <tr>
  <th style="width:40px;">
    <input type="checkbox" id="selectAll" onclick="toggleAll(this)">
  </th>
  <th>선택</th>         
  <th>유형</th>
  <th>제품명</th>
  <th>원가(원/kg)</th>
  <th>단위원가(단위/kg)</th>
  <th>날짜</th>
  </tr>
          </thead>
          <tbody id="productList"></tbody>
        </table>
      </div>
    </div>

    <!-- ===================== -->
    <!-- 원가 계산 -->
    <!-- ===================== -->
    <div id="calc" class="page" style="display:none;">
      <h2>원가 계산</h2>

      <div class="card">
        <label for="calcProductSelect">제품 선택</label>
        <select id="calcProductSelect" onchange="loadMaterialCostFromProduct()">
          <option value="">선택</option>
        </select>
      </div>

      <div class="card calc-form-card">
        <div class="calc-grid">

          <div class="field">
            <label for="materialCostInput">원재료 원가</label>
            <input id="materialCostInput" type="text" readonly />
          </div>

          <div class="field">
            <label for="mfg">제조비</label>
            <input id="mfg" type="number" />
          </div>

          <div class="field">
            <label for="pack">포장비</label>
            <input id="pack" type="number" />
          </div>

          <div class="field">
            <label for="logi">물류비</label>
            <input id="logi" type="number" />
          </div>

          <div class="field">
            <label for="margin">마진 (%)</label>
            <input id="margin" type="number" />
          </div>

          <div class="field">
            <label for="calcUnitCost">단위원가(단위/kg)</label>
            <input id="calcUnitCost" type="text" readonly />
          </div>

        </div>

        <div class="button-row">
          <button type="button" onclick="calculate()">계산</button>
          <button type="button" onclick="saveQuote()">저장</button>
        </div>
      </div>

      <div class="card">
        <p>제품명: <span id="calcProductName">-</span></p>
        <p>원재료: <span id="materialCostText">0</span></p>
        <p>부대비: <span id="extraCostText">0</span></p>
        <p>총원가: <span id="totalCostText">0</span></p>
        <p>견적가: <span id="result">0</span></p>
      </div>
    </div>

    <!-- ===================== -->
    <!-- 견적 조회 -->
    <!-- ===================== -->
    <div id="history" class="page" style="display:none;">
      <h2>견적 조회</h2>

      <div class="card">
        <div class="top-actions">
  <button onclick="loadSelected()">선택 불러오기</button>
  <button onclick="deleteSelected()">선택 삭제</button>
</div>
        <input
          id="quoteSearch"
          type="text"
          placeholder="제품명 검색"
          oninput="loadQuotes()"
        />

        <table>
          <thead>
            <tr>
              <th style="width:40px;">
  <input type="checkbox" id="selectAll" onclick="toggleAll(this)">
</th>
              <th>제품명</th>
              <th>견적가</th>
              <th>날짜</th>
              <th>삭제</th>
            </tr>
          </thead>
          <tbody id="quoteList"></tbody>
        </table>
      </div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
