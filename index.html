<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>제품 원가 견적 시스템</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>제품 원가 견적 시스템</h1>

<div class="menu">
<button onclick="showPage('db')">1 원재료 DB</button>
<button onclick="showPage('recipe')">2 배합표</button>
<button onclick="showPage('calc')">3 원가 계산</button>
<button onclick="showPage('history')">4 견적 조회</button>
</div>


<!-- 원재료 DB -->

<div id="db" class="page">

<h2>원재료 데이터베이스</h2>

<div class="card">

<label>원재료 코드</label>
<input id="materialCode">

<label>원재료 이름</label>
<input id="materialName">

<label>단가 (원/kg)</label>
<input id="materialPrice" type="number">

<label>적용 날짜</label>
<input id="materialDate" type="date">

<div class="button-row">
<button onclick="saveMaterial()">저장</button>
<button onclick="updateMaterial()">수정</button>
<button onclick="clearMaterialInputs()">초기화</button>
</div>

</div>


<div class="card">

<input id="materialSearch" placeholder="원재료 검색" oninput="loadMaterials()">

<table>

<thead>
<tr>
<th>No</th>
<th>코드</th>
<th>원재료명</th>
<th>단가</th>
<th>적용일</th>
<th>수정</th>
<th>삭제</th>
</tr>
</thead>

<tbody id="materialList"></tbody>

</table>

</div>

</div>


<!-- 배합표 -->

<div id="recipe" class="page" style="display:none">

<h2>배합표 작성</h2>

<label>제품명</label>
<input id="productName">

<button onclick="addRecipe()">원재료 추가</button>

<table id="recipeTable">

<thead>
<tr>
<th>원재료</th>
<th>단가</th>
<th>배합비</th>
<th>원가</th>
<th>삭제</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>


<!-- 원가 계산 -->

<div id="calc" class="page" style="display:none">

<h2>원가 계산</h2>

<label>제조비</label>
<input id="mfg" type="number">

<label>포장비</label>
<input id="pack" type="number">

<label>물류비</label>
<input id="logi" type="number">

<label>마진 (%)</label>
<input id="margin" type="number">

<button onclick="calculate()">계산</button>

<h3 id="result">0 원</h3>

</div>


<!-- 견적 조회 -->

<div id="history" class="page" style="display:none">

<h2>견적 조회</h2>

<table>

<thead>
<tr>
<th>제품명</th>
<th>견적가</th>
<th>날짜</th>
<th>삭제</th>
</tr>
</thead>

<tbody id="quoteList"></tbody>

</table>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
